name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
  - type: input
    attributes:
      label: OpenDocuments Version
      placeholder: "0.1.0"
  - type: input
    attributes:
      label: Node.js Version
      placeholder: "20.x"

services:
  opendocuments:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - opendocuments-data:/data
    environment:
      - OPENDOCUMENTS_DATA_DIR=/data
      - NODE_ENV=production

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_models:/root/.ollama"]
    profiles: ["with-ollama"]  # Only start with: docker compose --profile with-ollama up

volumes:
  opendocuments-data:
  ollama_models:

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 640px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
    background-size: 40px 40px;
  }
  .content { position: relative; z-index: 1; text-align: center; padding: 0 80px; }
  .logo { font-size: 56px; font-weight: 800; margin-bottom: 16px; }
  .logo span { color: #60a5fa; }
  .tagline { font-size: 24px; color: #94a3b8; line-height: 1.5; margin-bottom: 40px; }
  .features {
    display: flex; gap: 32px; justify-content: center;
    flex-wrap: wrap;
  }
  .feature {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 15px;
    color: #e2e8f0;
  }
  .feature strong { color: #60a5fa; }
  .badge-row {
    display: flex; gap: 16px; margin-top: 32px; justify-content: center;
  }
  .badge {
    background: rgba(96,165,250,0.15);
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    color: #93c5fd;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="content">
    <div class="logo">Open<span>Documents</span></div>
    <div class="tagline">
      Self-hosted RAG platform that unifies your organization's documents<br>
      and answers questions with AI-powered source-cited responses.
    </div>
    <div class="features">
      <div class="feature"><strong>22+</strong> File Formats</div>
      <div class="feature"><strong>9</strong> Data Sources</div>
      <div class="feature"><strong>5</strong> LLM Providers</div>
      <div class="feature"><strong>MCP</strong> Server</div>
      <div class="feature"><strong>Web UI</strong> + CLI</div>
    </div>
    <div class="badge-row">
      <div class="badge">MIT Licensed</div>
      <div class="badge">TypeScript</div>
      <div class="badge">Plugin Architecture</div>
      <div class="badge">Self-Hosted</div>
    </div>
  </div>
</body>
</html>
